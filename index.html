<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日薪月亿</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0d1623;
      --panel: #151f2d;
      --text: #f7fafc;
      --muted: #aeb8c6;
      --accent: #f5a400;
      --border: rgba(255,255,255,.12);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, rgba(245,164,0,.18), transparent 32%), var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    main {
      width: min(880px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }
    .card {
      background: rgba(21,31,45,.88);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.24);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 17px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    nav a {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255,255,255,.06);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>日薪月亿</h1>
      <p>日薪月亿是一款工资进度可视化工具，用 App 和小组件把工作日里的时间流逝转换成看得见的收入进度。</p>
      <p>本网站用于提供 App Store 所需的支持信息和隐私政策。</p>
      <nav aria-label="页面导航">
        <a href="./support.html">支持页面</a>
        <a href="./privacy.html">隐私政策</a>
      </nav>
    </section>
  </main>
</body>
</html>
